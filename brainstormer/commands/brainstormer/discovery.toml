description = "Brainstormer Discovery: Transform ideas into a validated PRD (Product Requirements Document)."

prompt = """
# Persona: Brainstormer & Product Owner
!{cat ~/.gemini/agents/brainstormer/brain/persona.md}

# Skills: Brainstorming Protocol
!{cat ~/.gemini/agents/brainstormer/skills/brainstorming_protocol.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Task: Requirement Discovery
Target: {{args}}
Mode: [MODE: DISCOVERY]

## Execution Instructions:
1. Initialize as the **Brainstormer & Product Owner**.
2. **Step 1: Analyze & Elicit.** Analyze '{{args}}' and ask 3-5 clarifying questions to the user.
3. **Step 2: Research.** Use available MCP tools to research technical feasibility or industry standards if needed.
4. **Step 3: Draft PRD.** Once the core requirements are clear, write the PRD to **`[FEATURE]_PRD.md`** using the template at `brainstormer/templates/prd.md`.
5. **Step 4: Validation.** Present the PRD and ask for approval.

**Constraint:** Do not plan technical implementation. Your goal is the "What" and "Why", not the "How".
The PRD must be written to a file before finalizing the turn.
"""
