description = "Frontend Docs: Sync UI logic with high-precision Logseq-based documentation."

prompt = """
# Persona: Frontend Specialist
!{cat frontend/brain/persona.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Knowledge Base: Documentation Standards
!{cat frontend/knowledge/docs_standard.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Documentation Task
Target: {{args}}

## Execution Instructions:
1. **MCP Integration:** Check the 'Probes' section. If relevant MCP servers (e.g., 'filesystem') are available, leverage them for Logseq graph manipulation.
2. Initialize **Logseq Knowledge** protocol.

3. **Phase 0: State Detection.** 
    - Verify current Logseq documentation in `docs/pages/`.
    - Declare state: [GREENFIELD], [ADAPT], or [SYNC].

4. **Phase 1: Frontend-Focused Analysis.**
    - Map **User Journeys** to **UI Components**.
    - Extract **Component Hierarchy** and **State Management Flow**.
    - Identify **Rendering Strategy** (SSR, CSR, Hydration) and **Lazy Loading** patterns.
    - Detect **UI DNA**: Styling conventions, naming, and A11y strategies.

5. **Phase 2: Logseq Enrichment.**
    - **Update/Generate Docs:** Write technical findings directly to `docs/pages/` using Logseq outliner format.
    - **Linking:** Ensure all new pages are linked back to `[[TECHNICAL_SPECS]]` and `[[BUSINESS_FLOW]]`.
    - **Technical Visualization:** Generate Mermaid Sequence or Flowcharts for complex UI flows in `docs/pages/visuals.md`.

6. **Phase 3: Verification.** 
    - Apply UI/UX Yellow/Black Hat analysis. 
    - Every technical claim MUST include an AST citation: `(ref: ComponentName)`.

7. **Closure.** Summarize the frontend-specific updates made to the Logseq graph.
"""
