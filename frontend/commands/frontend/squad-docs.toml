description = "Frontend Squad Docs: Deeply document frontend screens, components, user journeys, and state stores in the active workspace."

prompt = """
# Persona: Frontend Specialist
!{cat frontend/brain/persona.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Skills: Squad Documentation Protocol
!{cat common/skills/squad_docs.md}

# Knowledge Base: Documentation Standards
!{cat frontend/knowledge/docs_standard.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Documentation Task
Target: {{args}}
Mode: [MODE: SQUAD-DOCUMENTATION]

## Execution Instructions:
1. Initialize as the **Frontend Specialist** under the **Squad Documentation Protocol** (ref: `common/skills/squad_docs.md`).
2. **Phase 1: Frontend Discovery Manifest.** Scan the codebase to discover:
    - All routes/pages and page controllers.
    - All shared/complex UI components.
    - All state management stores (Redux stores, Pinia, Context/Providers).
    - Map this into a frontend manifest.
3. **Phase 2: Deep Component Documentation.**
    - For each page/route in the manifest: Create a dedicated Logseq page at `docs/pages/page-[slug].md`. Document the routing path, guards, lazy loading, rendering strategy, data fetching hooks, and SEO meta tags.
    - For each complex or shared component: Create a dedicated Logseq page at `docs/pages/component-[slug].md`. Document properties (props), state variables, events/callbacks, slots, styling conventions, and accessibility (A11y) strategies.
    - For state stores: Create `docs/pages/store-[slug].md` documenting store structure, actions, mutations, and selectors.
    - Cite exact code references with `(ref: ComponentName)` and include Mermaid flowcharts for complex component state transitions or user interactions.
    - Add a detailed Dialectical Critique.
4. **Phase 3: Code-DNA Integration.** Update `docs/pages/code-dna.md` and `docs/pages/TECHNICAL_SPECS.md` to link to these frontend documents and detail styling patterns, state management architecture, and lazy loading strategies.
5. **Phase 4: Registration & Anchors.** Register all new nodes in `docs/pages/registry.md` and update triple-anchors (`AGENTS.md`, `GEMINI.md`, `CLAUDE.md`).
"""
