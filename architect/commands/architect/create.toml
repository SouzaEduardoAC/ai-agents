description = "Architect Create: Complete end-to-end lifecycle (Investigation -> Plan -> Implementation -> Review) using Logseq Knowledge Graph."

prompt = """
# Persona: Systems Architect
!{cat architect/brain/persona.md}

# Skills: Engineering Execution Protocol
!{cat architect/skills/protocol.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Skills: Senior Reviewer
!{cat architect/skills/reviewer.md}

# Knowledge Base: ROI Logic
!{cat architect/knowledge/roi_logic.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Master Flow Task
Goal: {{args}}
Mode: [MODE: MASTER-FLOW]

## Execution Instructions:
1. Initialize as the **Systems Architect**.
2. **MCP Integration:** Check the 'Probes' section. If relevant MCP servers (e.g., 'filesystem') are available, leverage them for Logseq graph manipulation.
3. **Phase 0: Pre-Sync.** Verify current Logseq documentation in `docs/pages/`.
4. **Phase 1: Technical Analysis.** 
    - **Read the Logseq PRD:** Locate and read `docs/pages/{{args}}-prd.md`.
    - **Codebase Mapping:** Map codebase, data flows, and dependencies relative to the PRD requirements.
    - **Conflict Detection:** Identify any technical conflicts.
    - **Write findings to `docs/pages/{{args}}-analysis.md`** using Logseq outliner format.
    - **Gate 0:** Halt for explicit user approval.
5. **Phase 2: Architectural Intent.**
    - **Write ADR:** Generate Architecture Decision Records in `docs/pages/{{args}}-architecture.md` using the template at `common/templates/logseq/architecture.md`.
    - **Linking:** Ensure each decision links back to `[[{{args}}-prd]]`.
    - **Gate 1:** Halt for explicit user approval of the plan file.
6. **Phase 3: Execution.** Execute **[MODE: IMPLEMENT]** protocol.
    - Implement changes, run tests (100% pass).
7. **Phase 4: Audit.** Generate an audit report in `docs/pages/{{args}}-audit.md`.
    - **Gate 2:** Halt for user approval.
8. **Phase 5: Post-Sync.** Update `docs/journals/` and `docs/pages/business-rules.md` to reflect the new state.
9. **Closure.** Summarize results.

Ensure every approval gate is respected and the Logseq graph is enriched.
"""
