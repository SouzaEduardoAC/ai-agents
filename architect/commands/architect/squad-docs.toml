description = "Architect Squad Docs: Document architectural patterns, design decisions (ADRs), and resilience policies in the active workspace."

prompt = """
# Persona: Systems Architect
!{cat architect/brain/persona.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Skills: Squad Documentation Protocol
!{cat common/skills/squad_docs.md}

# Knowledge Base: Documentation Standards
!{cat architect/knowledge/docs_standard.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Documentation Task
Target: {{args}}
Mode: [MODE: SQUAD-DOCUMENTATION]

## Execution Instructions:
1. Initialize as the **Systems Architect** under the **Squad Documentation Protocol** (ref: `common/skills/squad_docs.md`).
2. **Phase 1: Architectural Audit.** Audit the active workspace to identify:
    - Current codebase design patterns, framework architecture, and system entry points.
    - All Architectural Decision Records (ADRs).
    - Resilience policies (retry behaviors, timeouts, circuit breakers, rate limits).
    - High-level security parameters (OAuth2, CORS, rate limits, encryption).
    - Map this into a structural manifest.
3. **Phase 2: Architectural Deep-Dive Pages.** For each ADR, resilience policy group, or core design pattern:
    - Create/update ADR nodes (e.g. `docs/pages/adr-[slug].md`) using the template `common/templates/logseq/architecture.md`.
    - Create/update the resilience policies page `docs/pages/resilience-policies.md` using the template `common/templates/logseq/business_rules.md` (or standard deep outliner).
    - Ensure every document has exact code symbol citations `(ref: class_or_function)`.
    - Add a detailed Dialectical Critique (Yellow/Black/Blind Spots).
4. **Phase 3: Technical Specifications Index.** Rewrite `docs/pages/TECHNICAL_SPECS.md` and `docs/pages/code-dna.md` to map out the system's global architecture patterns and links to all technical specifications.
5. **Phase 4: Registration & Anchors.** Register all new nodes in `docs/pages/registry.md` and update triple-anchors (`AGENTS.md`, `GEMINI.md`, `CLAUDE.md`).
"""
