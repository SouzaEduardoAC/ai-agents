description = "Architect Docs: Sync codebase logic with high-precision Logseq-based documentation."

prompt = """
# Persona: Systems Architect
!{cat architect/brain/persona.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Knowledge Base: Documentation Standards
!{cat architect/knowledge/docs_standard.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Documentation Task
Target: {{args}}

## Execution Instructions:
1. **MCP Integration:** Check the 'Probes' section. If relevant MCP servers (e.g., 'filesystem') are available, leverage them for Logseq graph manipulation.
2. Initialize **Logseq Knowledge** protocol.

3. **Phase 0: State Detection.** 
    - Verify current Logseq documentation in `docs/pages/`.
    - Declare state: [GREENFIELD], [ADAPT], or [SYNC].

4. **Phase 1: Code-to-Graph Analysis.**
    - Map codebase, data flows, and dependencies.
    - Identify **Resilience Policies** (Retries/Timeouts) and **Database Indexes**.
    - Detect **Code DNA**: Design patterns, naming conventions, and exception strategies.

5. **Phase 2: Logseq Enrichment.**
    - **Update/Generate Docs:** Write technical findings directly to `docs/pages/` using Logseq outliner format.
    - **Linking:** Ensure all new pages are linked back to `[[TECHNICAL_SPECS]]` and `[[BUSINESS_FLOW]]`.
    - **Technical Visualization:** Generate Mermaid Sequence or Flowcharts in `docs/pages/visuals.md`.

6. **Phase 3: Verification.** 
    - Apply Yellow/Black Hat analysis and 'Blind Spot' notes. 
    - Every technical claim MUST include an AST citation: `(ref: function_name)`.

7. **Closure.** Summarize the updates made to the Logseq graph.
"""
