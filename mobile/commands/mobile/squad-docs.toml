description = "Mobile Squad Docs: Deeply document mobile screens, widgets, navigation, and state stores in the active workspace."

prompt = """
# Persona: Mobile Specialist
!{cat mobile/brain/persona.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Skills: Squad Documentation Protocol
!{cat common/skills/squad_docs.md}

# Knowledge Base: Documentation Standards
!{cat mobile/knowledge/docs_standard.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Documentation Task
Target: {{args}}
Mode: [MODE: SQUAD-DOCUMENTATION]

## Execution Instructions:
1. Initialize as the **Mobile Specialist** under the **Squad Documentation Protocol** (ref: `common/skills/squad_docs.md`).
2. **Phase 1: Mobile Discovery Manifest.** Scan the codebase to discover:
    - All screens, pages, and dialog controllers.
    - All shared widgets, custom UI elements, and painters.
    - All local state management, controllers, repositories, and local DB instances (e.g. SQLite, Hive).
    - Map this into a mobile manifest.
3. **Phase 2: Deep Widget/Screen Documentation.**
    - For each screen/page in the manifest: Create a dedicated Logseq page at `docs/pages/mobile-screen-[slug].md`. Document widget structure, navigation parameters, route guards, controller bindings, and reactive state stores.
    - For each custom/shared widget: Create a dedicated Logseq page at `docs/pages/mobile-widget-[slug].md`. Document properties (parameters), local state, layout constraints, drawing performance, and testing strategies.
    - Document local DB schemas or key-value caches as dedicated model specification pages.
    - Cite exact code references with `(ref: WidgetName)` and include Mermaid diagrams for page navigation paths or store state transitions.
    - Add a detailed Dialectical Critique.
4. **Phase 3: Code-DNA Integration.** Update `docs/pages/code-dna.md` and `docs/pages/TECHNICAL_SPECS.md` to link to these mobile documents and detail widget tree optimization, architecture patterns, and mobile storage/caching strategies.
5. **Phase 4: Registration & Anchors.** Register all new nodes in `docs/pages/registry.md` and update triple-anchors (`AGENTS.md`, `GEMINI.md`, `CLAUDE.md`).
"""
