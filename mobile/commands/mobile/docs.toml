description = "Mobile Docs: Sync Mobile logic with high-precision Logseq-based documentation."

prompt = """
# Persona: Mobile Specialist
!{cat mobile/brain/persona.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Knowledge Base: Documentation Standards
!{cat mobile/knowledge/docs_standard.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Documentation Task
Target: {{args}}

## Execution Instructions:
1. **MCP Integration:** Check the 'Probes' section. If relevant MCP servers (e.g., 'filesystem') are available, leverage them for Logseq graph manipulation.
2. Initialize **Logseq Knowledge** protocol.

3. **Phase 0: State Detection.** 
    - Verify current Logseq documentation in `docs/pages/`.
    - Declare state: [GREENFIELD], [ADAPT], or [SYNC].

4. **Phase 1: Mobile-Focused Analysis.**
    - Map **User Journeys** to **Mobile Screens**.
    - Extract **Widget Hierarchy** and **State Management Flow**.
    - Identify **Navigation Strategy** and **Platform Integration** patterns.
    - Detect **Mobile DNA**: Platform conventions, state management usage, and A11y strategies.

5. **Phase 2: Logseq Enrichment.**
    - **Update/Generate Docs:** Write technical findings directly to `docs/pages/` using Logseq outliner format.
    - **Linking:** Ensure all new pages are linked back to `[[TECHNICAL_SPECS]]` and `[[BUSINESS_FLOW]]`.
    - **Technical Visualization:** Generate Mermaid Sequence or Flowcharts for complex mobile flows in `docs/pages/visuals.md`.

6. **Phase 2.5: AI Context & Graph Synchronization.**
    - **Triple-Anchor Update:** Create or update ALL THREE root-level cognitive anchors: `AGENTS.md` (Universal), `GEMINI.md` (Gemini/AntiGravity CLI), and `CLAUDE.md` (Claude Code).
    - **Cognitive Anchors:** `AGENTS.md` is the primary universal anchor; `GEMINI.md` is the override for Gemini/AntiGravity CLI; `CLAUDE.md` is the override for Claude Code (MCP tool instructions, no slash commands).
    - **Graph Linking:** Ensure all three files link to all relevant specialized agents and the `docs/pages/` graph nodes using `[[links]]`.
    - **Logseq Style:** Rigorously use `[[links]]`, `#tags`, and `TODO/DONE` markers throughout `AGENTS.md`, `GEMINI.md`, `CLAUDE.md`, and `docs/pages/`.

7. **Phase 3: Verification.** 
    - Apply Mobile Yellow/Black Hat analysis. 
    - Every technical claim MUST include an AST citation: `(ref: WidgetName)`.

8. **Output:**
    - `AGENTS.md` (Universal AI Context)
    - `GEMINI.md` (Gemini/AntiGravity CLI Context)
    - `CLAUDE.md` (Claude Code MCP Context)

9. **Closure.** Summarize the mobile-specific updates made to the Logseq graph.
"""
