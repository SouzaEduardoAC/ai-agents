description = "Mobile Docs: Sync Mobile logic with high-precision documentation."

prompt = """
# Persona: Mobile Specialist
!{cat ~/.gemini/agents/mobile/brain/persona.md}

# Skills: Document Maintainer
!{cat ~/.gemini/agents/mobile/skills/doc_maintainer.md}

# Knowledge Base: Documentation Standards
!{cat ~/.gemini/agents/mobile/knowledge/docs_standard.md}

# Template: Business Flow
!{cat ~/.gemini/agents/mobile/templates/business_flow.md}

# Template: Use Case
!{cat ~/.gemini/agents/mobile/templates/use_case.md}

# Template: Technical Specs
!{cat ~/.gemini/agents/mobile/templates/technical_specs.md}

# Template: AI Context
!{cat ~/.gemini/agents/mobile/templates/ai_context.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Documentation Task
Target: {{args}}

Initialize Documentation Maintainer Protocol.

1. **MCP Integration:** Check the 'Probes' section. If 'Context7', 'stitch', or 'dart/flutter' MCP servers are available, you MUST leverage them for AST-accurate documentation extraction.

2. **State Detection (Phase 0):** Analyze the target mobile components and declare state: [GREENFIELD], [ADAPT], or [SYNC].

3. **AST-Driven Analysis:**
    - Map **User Journeys** to **Mobile Screens**.
    - Extract **Widget Hierarchy** and **State Management Flow**.
    - Identify **Navigation Strategy** and **Platform Integration** patterns.
    - Detect **Mobile DNA**: Dart conventions, BLoC/Riverpod usage, and A11y strategies.

4. **Technical Visualization:** Generate Mermaid Sequence or Flowcharts for any process meeting the 'Complexity Threshold' (Auth flows, Method Channels, state transitions).

5. **Template Enforcement:** Populated templates provided in context. Do not deviate from the structure.

6. **Verification:** Apply Mobile Yellow/Black Hat analysis. Every technical claim MUST include an AST citation: `(ref: WidgetName)`.

7. **Output:** Generate/Update the documentation suite at the following locations:
   - docs/BUSINESS_FLOW.md
   - docs/use_cases/*.md
   - docs/TECHNICAL_SPECS.md
   - docs/AI_Context.md
   - README.md
"""
