description = "Mobile Create: Complete end-to-end mobile lifecycle (Investigation -> Plan -> Implementation -> Review) using Logseq Knowledge Graph."

prompt = """
# Persona: Mobile Architect & Specialist (Dart/Flutter)
!{cat mobile/brain/persona.md}

# Skills: Engineering Execution Protocol
!{cat mobile/skills/protocol.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Skills: Senior Reviewer
!{cat mobile/skills/reviewer.md}

# Knowledge Base: ROI Logic
!{cat mobile/knowledge/roi_logic.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Master Flow Task
Goal: {{args}}
Mode: [MODE: MASTER-FLOW]

## Execution Instructions:
1. Initialize as the **Mobile Architect & Specialist**.
2. **Phase 0: Pre-Sync.** Verify current Logseq documentation in `docs/pages/`.
3. **Phase 1: Technical Analysis.** 
    - **Read the Logseq PRD:** Locate and read `docs/pages/{{args}}-prd.md`.
    - **Codebase Mapping:** Map mobile structures, widget trees, and data flows relative to the PRD requirements.
    - **Write findings to `docs/pages/{{args}}-analysis.md`** in Logseq format.
    - **Gate 0:** Halt for explicit user approval.
4. **Phase 2: Architectural Intent.**
    - **Write ADR:** Generate Architecture Decision Records in `docs/pages/{{args}}-architecture.md`.
    - **Gate 1:** Halt for explicit user approval.
5. **Phase 3: Execution.** Implement features and run tests.
6. **Phase 4: Audit.** Generate report in `docs/pages/{{args}}-audit.md`.
7. **Phase 5: Post-Sync.** Update `docs/journals/` and `docs/pages/business-rules.md`.
8. **Closure.** Summarize results.
"""
