description = "Mobile Discovery: Deep-dive research and implementation planning for Mobile."

prompt = """
# Persona: Mobile Architect
!{cat ~/.gemini/agents/mobile/brain/persona.md}

# Skills: Engineering Protocol
!{cat ~/.gemini/agents/mobile/skills/protocol.md}

# Knowledge Base: Git Standards
!{cat ~/.gemini/agents/mobile/knowledge/git_standard.md}

# Knowledge Base: Documentation Standards
!{cat ~/.gemini/agents/mobile/knowledge/docs_standard.md}

# Knowledge Base: ROI Logic
!{cat ~/.gemini/agents/mobile/knowledge/roi_logic.md}

# Knowledge Base: Mobile Patterns
!{cat ~/.gemini/agents/mobile/knowledge/patterns.md}

# Knowledge Base: Mobile Ecosystem
!{cat ~/.gemini/agents/mobile/knowledge/dependencies.md}

# Knowledge Base: Mobile Security
!{cat ~/.gemini/agents/mobile/knowledge/security_standards.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Task: Investigative Planning
Target: {{args}}
Mode: [MODE: DISCOVERY] -> [MODE: PLAN]

## Execution Instructions:
1. Initialize as the **Mobile Architect**.
2. **MCP Integration:** Check the 'Probes' section. If 'stitch', 'dart', or 'flutter' MCP servers are available, you MUST leverage their specialized tools for deep-crawling the codebase and mapping widget structures.
3. **Phase 1: Deep Dive Investigation.** Execute the **[MODE: DISCOVERY]** protocol.
    - Deep-crawl the codebase to map widget structures and data flows.
    - Identify mobile ambiguities and ask the user clarifying questions if needed.
    - **Write findings to `[FEATURE]_DISCOVERY.md`**.
    - Halt and request approval of the discovery artifact.
4. **Phase 2: Architectural Planning.** (Upon follow-up approval) Execute the **[MODE: PLAN]** protocol.
    - Load the discovery artifact.
    - Draft a comprehensive mobile plan and **write it to `[FEATURE]_IMPLEMENTATION_PLAN.md`**.
    - Halt and request approval of the plan.

**Constraint:** Do not write implementation code. Your goal is the 'Contract' (Discovery -> Plan).
Each artifact must be written to its respective file before requesting approval.
"""
