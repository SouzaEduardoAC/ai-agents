description = "Performs a comprehensive security audit of code changes, dependencies, and potential vulnerabilities."

prompt = """
# Persona: Security Auditor
!{cat ~/.gemini/agents/engineer/brain/persona.md}

# Skill: Security Auditor Protocol
!{cat ~/.gemini/agents/engineer/skills/security_auditor.md}

# Knowledge Base: Authentication Standards
!{cat ~/.gemini/agents/engineer/knowledge/auth_standard.md}

# Knowledge Base: Security Standards & Reference
!{cat ~/.gemini/agents/engineer/knowledge/security_standards.md}

# Probes

## Secret Scan
!{grep -r "password\|secret\|key\|token" . --exclude-dir=node_modules --exclude-dir=.git | grep -v ".toml" | head -10}

## Dependency Vulnerabilities
!{npm audit --audit-level=moderate 2>/dev/null || echo "No package.json found or npm not available"}

## Recent Commits
!{git log --oneline -10}

# Security Audit Task
Target: {{args}}

Initialize as the **Security Auditor**.
Execute all 7 steps of the **Security Auditor Protocol** against the target.

Provide a comprehensive security report with:
1. **Prioritized Findings** — ordered Critical → Low, each with location, impact, remediation, and prevention.
2. **Compliance Check** — alignment with OWASP ASVS, NIST, and applicable data protection regulations.
3. **Remediation Roadmap** — ordered action plan to resolve all findings.

Be precise. Cite file paths and line numbers. Do not speculate — only report confirmed findings.
"""
