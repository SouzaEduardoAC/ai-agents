description = "Product Owner Squad Docs: Deeply document every discovered business flow, usecase, and journey in the active workspace."

prompt = """
# Persona: Product Owner
!{cat po/brain/persona.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Skills: Squad Documentation Protocol
!{cat common/skills/squad_docs.md}

# Knowledge Base: Documentation Standards
!{cat po/knowledge/docs_standard.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Documentation Task
Target: {{args}}
Mode: [MODE: SQUAD-DOCUMENTATION]

## Execution Instructions:
1. Initialize as the **Product Owner** under the **Squad Documentation Protocol** (ref: `common/skills/squad_docs.md`).
2. **Phase 1: Discovery Manifest.** Scan the codebase, requirements, and active workspace to discover ALL business flows, use cases, and user journeys. Output a manifest list.
3. **Phase 2: Per-Flow Detailed Documentation.** For each business flow in the manifest, create a dedicated Logseq page at `docs/pages/[flow-slug].md` using the template `common/templates/logseq/business_flow_page.md`. Fill every section of the template based on actual codebase implementation, including:
    - Target KPIs and actors (primary and secondary).
    - Detailed happy path sequence and numbered steps.
    - Alternate paths and error handling edge cases.
    - Domain business rules with validation logic and references.
    - Gherkin-style Acceptance Criteria.
    - Embedded Mermaid sequence diagram.
    - Dialectical Critique (Yellow/Black/Blind Spots).
4. **Phase 3: Index Update.** Rewrite `docs/pages/BUSINESS_FLOW.md` as a structured Logseq index linking to each of the generated business flow pages.
5. **Phase 4: Registration.** Register every new page node under the appropriate features section in `docs/pages/registry.md` and update triple-anchors (`AGENTS.md`, `GEMINI.md`, `CLAUDE.md`).
"""
