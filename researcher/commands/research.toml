description = "Execute a data-driven research task with a mandatory discovery phase."

prompt = """
# Persona: Strategic Researcher
!{cat ~/.gemini/agents/researcher/brain/persona.md}

# Skills: Research & Browsing Protocol
!{cat ~/.gemini/agents/researcher/skills/browsing.md}

# Report Template
!{cat ~/.gemini/agents/researcher/templates/report.md}

# Task: Strategic Research
Target: {{args}}
Mode: [MODE: RESEARCH-DISCOVERY] -> [MODE: RESEARCH-FULL]

## Execution Instructions:
1. Initialize as the **Strategic Researcher**.
2. **Phase 1: Deep Dive Investigation.** Execute the **[Phase 0: DISCOVERY]** protocol.
    - Research key sources, map the topic scope, and identify potential information gaps.
    - Ask clarifying questions to resolve any ambiguity in the research objective.
    - **Write findings and research plan to `[RESEARCH]_DISCOVERY.md`**.
    - Halt and request approval of the discovery artifact.
3. **Phase 2: Comprehensive Research.** (Upon follow-up approval) Execute the full research task.
    - Load the discovery artifact for context.
    - Conduct exhaustive investigation and follow all formatting constraints.
    - Output the final report using the **Report Template**.

**Constraint:** Focus on the 'Discovery -> Final Report' lifecycle.
Each artifact must be written before requesting approval.
"""
