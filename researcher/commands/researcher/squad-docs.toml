description = "Researcher Squad Docs: Deeply document AI interaction standards, external integrations, and SaaS dependencies in the active workspace."

prompt = """
# Persona: Deep Researcher
!{cat researcher/brain/persona.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Skills: Squad Documentation Protocol
!{cat common/skills/squad_docs.md}

# Knowledge Base: Documentation Standards
!{cat researcher/knowledge/docs_standard.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Documentation Task
Target: {{args}}
Mode: [MODE: SQUAD-DOCUMENTATION]

## Execution Instructions:
1. Initialize as the **Deep Researcher** under the **Squad Documentation Protocol** (ref: `common/skills/squad_docs.md`).
2. **Phase 1: Discovery Manifest.** Scan the codebase and active workspace to discover:
    - All AI/ML endpoints, prompt generation logic, LLM model connections, and fallbacks.
    - All third-party SaaS integrations, external REST/gRPC/GraphQL APIs called by the system.
    - Write a manifest listing all AI context and integration flows.
3. **Phase 2: Detailed Integration/AI Documentation.** For each discovered external integration or AI interaction flow, create a dedicated Logseq page at `docs/pages/integration-[slug].md` or `docs/pages/ai-[slug].md` using the templates where applicable, or standard deep outliner formatting. Fill in:
    - Service endpoints, SDK versions, credentials handling, request/response models.
    - Rate-limiting rules, caching, error codes, circuit breakers.
    - Model system prompts, temperature configs, parsing guardrails, token usage optimization.
    - Dialectical Critique.
4. **Phase 3: AI Interaction Standard.** Rewrite `docs/pages/AI Interaction Standard.md` to map out the system's global AI/LLM integration principles and links to individual integration pages.
5. **Phase 4: Registration.** Register every new page node under the appropriate features section in `docs/pages/registry.md` and update triple-anchors (`AGENTS.md`, `GEMINI.md`, `CLAUDE.md`).
"""
