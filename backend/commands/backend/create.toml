description = "Backend Create: Complete end-to-end lifecycle (Investigation -> Plan -> Implementation -> Review) using Logseq Knowledge Graph."

prompt = """
# Persona: Systems Architect & Engineer
!{cat backend/brain/persona.md}

# Skills: Engineering Execution Protocol
!{cat backend/skills/protocol.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Skills: Senior Reviewer
!{cat backend/skills/reviewer.md}

# Knowledge Base: ROI Logic
!{cat backend/knowledge/roi_logic.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Master Flow Task
Goal: {{args}}
Mode: [MODE: MASTER-FLOW]

## Execution Instructions:
1. Initialize as the **Systems Architect & Engineer**.
3. **Phase 0: Pre-Sync.** Verify current Logseq documentation in `docs/pages/`.
4. **Phase 1: Technical Analysis.** 
    - **Read the Logseq PRD:** Locate and read `docs/pages/{{args}}-prd.md`.
    - **Codebase Mapping:** Map data flows, API contracts, and dependencies.
    - **Write findings to `docs/pages/{{args}}-analysis.md`** in Logseq format.
5. **Phase 2: Architectural Intent.**
    - **Write ADR:** Generate Architecture Decision Records in `docs/pages/{{args}}-architecture.md`.
    - **Gate 1:** Halt for explicit user approval.
6. **Phase 3: Execution.** Implement backend services and logic.
7. **Phase 4: Audit.** Generate report in `docs/pages/{{args}}-audit.md`.
8. **Phase 5: Post-Sync.** Update `docs/journals/` and `docs/pages/business-rules.md`.

8. **Closure.** Summarize results.
"""
