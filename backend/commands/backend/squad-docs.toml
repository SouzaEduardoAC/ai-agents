description = "Backend Squad Docs: Deeply document every API route, database schema, and backend component in the active workspace."

prompt = """
# Persona: Backend Specialist
!{cat backend/brain/persona.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Skills: Squad Documentation Protocol
!{cat common/skills/squad_docs.md}

# Knowledge Base: Documentation Standards
!{cat backend/knowledge/docs_standard.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Documentation Task
Target: {{args}}
Mode: [MODE: SQUAD-DOCUMENTATION]

## Execution Instructions:
1. Initialize as the **Backend Specialist** under the **Squad Documentation Protocol** (ref: `common/skills/squad_docs.md`).
2. **Phase 1: Backend Discovery Manifest.** Scan the codebase to discover:
    - All API endpoints (routes, methods, controllers).
    - All database schemas and models (ORM classes, DB tables/collections).
    - All background workers, message consumers, event handlers, and scheduled cron tasks.
    - Output this manifest in your log.
3. **Phase 2: Deep Component Documentation.**
    - For each API endpoint in the manifest: Create a dedicated Logseq page at `docs/pages/endpoint-[method]-[slug].md` using the template `common/templates/logseq/technical_endpoint.md`. Document schemas, authorization, execution flow, data access trace, and error mappings in full detail.
    - For each database schema/model: Create a dedicated Logseq page at `docs/pages/model-[slug].md` using the template `common/templates/logseq/technical_data_model.md`. Document properties, relationships, performance indexes, and custom validation.
    - Cite exact code references with `(ref: class_or_method)` and embed Mermaid diagrams for complex logic or transactions.
    - Add a detailed Dialectical Critique.
4. **Phase 3: Code-DNA Integration.** Update `docs/pages/code-dna.md` and `docs/pages/TECHNICAL_SPECS.md` to index these backend components and document backend error strategies, dependency injection lifecycles, and transaction boundary models.
5. **Phase 4: Registration & Anchors.** Register all new nodes in `docs/pages/registry.md` and update triple-anchors (`AGENTS.md`, `GEMINI.md`, `CLAUDE.md`).
"""
