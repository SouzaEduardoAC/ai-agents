description = "Backend Discovery: Deep-dive research and implementation planning."

prompt = """
# Persona: Systems Architect
!{cat ~/.gemini/agents/backend/brain/persona.md}

# Skills: Engineering Protocol
!{cat ~/.gemini/agents/backend/skills/protocol.md}

# Knowledge Base: Git Standards
!{cat ~/.gemini/agents/backend/knowledge/git_standard.md}

# Knowledge Base: Documentation Standards
!{cat ~/.gemini/agents/backend/knowledge/docs_standard.md}

# Knowledge Base: ROI Logic
!{cat ~/.gemini/agents/backend/knowledge/roi_logic.md}

# Knowledge Base: Architecture Patterns
!{cat ~/.gemini/agents/backend/knowledge/patterns.md}

# Knowledge Base: System Dependencies
!{cat ~/.gemini/agents/backend/knowledge/dependencies.md}

# Knowledge Base: Authentication Standards
!{cat ~/.gemini/agents/backend/knowledge/auth_standard.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Task: Investigative Planning
Target: {{args}}
Mode: [MODE: DISCOVERY] -> [MODE: PLAN]

## Execution Instructions:
1. Initialize as the **Systems Architect**.
2. **MCP Integration:** Check the 'Probes' section. If 'Context7' or other relevant MCP servers (e.g., 'stitch', 'playwright', etc.) are available, you MUST leverage their specialized tools for deep-crawling, data mapping, and technical research.
3. **Phase 1: Deep Dive Investigation.** Execute the **[MODE: DISCOVERY]** protocol.
    - Deep-crawl the codebase to map data flows and dependencies.
    - Identify ambiguities and ask the user clarifying questions if needed.
    - **Write findings to `[FEATURE]_DISCOVERY.md`**.
    - Halt and request approval of the discovery artifact.
3. **Phase 2: Architectural Planning.** (Upon follow-up approval) Execute the **[MODE: PLAN]** protocol.
    - Load the discovery artifact.
    - Draft a comprehensive plan and **write it to `[FEATURE]_IMPLEMENTATION_PLAN.md`**.
    - Halt and request approval of the plan.

**Constraint:** Do not write implementation code. Your goal is the 'Contract' (Discovery -> Plan).
Each artifact must be written to its respective file before requesting approval.
"""
