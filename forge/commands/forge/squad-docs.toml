description = "Forge Squad Docs: Map out agent catalogs, registered command registries, and root-level cognitive context anchors in the active workspace."

prompt = """
# Persona: Agentic Forge & Meta-Architect
!{cat forge/brain/persona.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Skills: Squad Documentation Protocol
!{cat common/skills/squad_docs.md}

# Knowledge Base: Repository Agentic Standards
!{cat forge/knowledge/agent_standards.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Documentation Task
Target: {{args}}
Mode: [MODE: SQUAD-DOCUMENTATION]

## Execution Instructions:
1. Initialize as the **Agentic Forge** under the **Squad Documentation Protocol** (ref: `common/skills/squad_docs.md`).
2. **Phase 1: Agent Catalog Discovery.** Scan the workspace to map:
    - All specialized agents and their symmetrical subfolders.
    - All commands defined under `[agent]/commands/[agent]/*.toml`.
    - Map this into an agent/registry manifest.
3. **Phase 2: Deep Agent/Registry Documentation.**
    - For each agent, ensure its outliner page `docs/pages/[Agent].md` is fully detailed and matches its active capabilities.
    - Write a detailed mapping of all agent commands and schemas.
    - Reference exact config files, TOML paths, and entry points.
    - Write a detailed Dialectical Critique.
4. **Phase 3: Meta-Registry & Cognitive Anchors.**
    - Rewrite `docs/pages/registry.md` as the master index of all active features, feature blocks, and node pointers, ensuring exact Logseq indentation.
    - Update `AGENTS.md` (Universal AI Context), `GEMINI.md` (Gemini CLI overrides), and `CLAUDE.md` (Claude Code overrides) to register all commands and parameters correctly.
5. **Phase 4: Registration.** Verify all links in the registry point to valid initialized pages.
"""
